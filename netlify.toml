[build]
  command = "echo 'Using prebuilt build directory'"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm start"
  port = 8888
  targetPort = 3000
  framework = "#custom"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
